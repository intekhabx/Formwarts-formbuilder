services:
  postgresdb:
    image: postgres:15
    restart: unless-stopped
    container_name: postgresdb

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: formwards_form_builder

    ports:
      - "5432:5432"

    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
